# Firmware CI Pipeline
# Runs on every push and pull request
# Checks: lint (ruff), type-check (mypy), unit tests (pytest), coverage

name: Firmware CI

on:
  push:
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-ci.yml'
  pull_request:
    paths:
      - 'firmware/**'

jobs:
  quality:
    name: Lint + Type Check + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-firmware-${{ hashFiles('firmware/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-firmware-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov
          if [ -f firmware/requirements.txt ]; then pip install -r firmware/requirements.txt; fi
          if [ -f firmware/requirements-dev.txt ]; then pip install -r firmware/requirements-dev.txt; fi

      - name: Lint with ruff (zero warnings)
        run: ruff check firmware/
        if: hashFiles('firmware/**/*.py') != ''

      - name: Type check with mypy (strict)
        run: mypy firmware/ --strict --ignore-missing-imports
        if: hashFiles('firmware/**/*.py') != ''

      - name: Run tests with coverage
        run: |
          pytest tests/firmware/ --cov=firmware --cov-report=term-missing --cov-fail-under=80
        if: hashFiles('tests/firmware/**/*.py') != ''

      - name: Check cyclomatic complexity
        run: |
          pip install radon
          radon cc firmware/ -a -nc
        if: hashFiles('firmware/**/*.py') != ''
